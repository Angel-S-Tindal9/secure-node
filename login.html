<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureNode - Acceso Organizacional</title>
    
    <!-- Enlazamos ambos CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <main class="auth-container">
        <section class="auth-box">
            <h1>SecureNode System</h1>
            <p>Protocolo de Aislamiento Activo. Ingrese credenciales para intervenir.</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">ID de Operador</label>
                    <input type="text" id="username" autocomplete="off" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Clave de Acceso</label>
                    <input type="password" id="password" required>
                </div>
                
                <button type="submit" class="btn-primary">Iniciar Sesión</button>
                <div id="login-error"></div>
            </form>
        </section>
    </main>

    <!-- Cargamos la lógica de sesión -->
    <script src="js/auth/session.js"></script>
    <script src="js/auth/login.js"></script>

</body>
</html>
