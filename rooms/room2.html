<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room 2 - Panel de Seguridad</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/rooms.css">
</head>
<body>

    <header class="room-header">
        <div class="room-title">SALA 2: TERMINAL DE SEGURIDAD</div>
        <button id="btn-back" class="btn-back">⬅ Volver a Sala 1</button>
        <button id="btn-exit-game" class="btn-back" style="border-color: #ef4444; color: #ef4444;">✖ Salir</button>
    </header>

    <main class="game-area">
        <div id="room-environment" class="room-bg" style="background-color: #1c2833;">
            
            <!-- Elementos Interactivos -->
            <div id="door-final" class="interactable locked" style="right: 5%; bottom: 0; width: 200px; background-color: #212f3d;">Puerta de Salida (Bloqueada)</div>
            
            <div id="memory-panel-trigger" class="interactable" style="left: 40%; top: 30%; width: 150px; height: 100px; background-color: #34495e; border-radius: 8px;">Panel del Servidor</div>

            <div class="interactable radio-oculta" style="left: 10%; top: 80%; width: 40px; height: 30px; background-color: #555; border-radius: 4px;">Radio</div>
        </div>

        <!-- Modal del Puzzle de Memoria -->
        <div id="memory-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Anulación de Seguridad</h3>
                <p id="memory-status">Repite la secuencia luminosa para desbloquear el sistema.</p>
                
                <div class="memory-grid">
                    <button class="memory-btn" data-color="green" id="btn-green"></button>
                    <button class="memory-btn" data-color="red" id="btn-red"></button>
                    <button class="memory-btn" data-color="yellow" id="btn-yellow"></button>
                    <button class="memory-btn" data-color="blue" id="btn-blue"></button>
                </div>
                
                <button id="btn-start-memory" class="btn-primary" style="margin-top: 15px;">Iniciar Secuencia</button>
                <button id="btn-close-memory" class="btn-close" style="margin-top: 10px; width: 100%;">Cerrar</button>
            </div>
        </div>
    </main>

    <!-- Barra de Inventario (Mismo sistema) -->
    <footer id="inventory-bar">
        <div class="inventory-title">OBJETOS:</div>
        <div id="inventory-slots" class="slots-container"></div>
    </footer>

    <script src="../js/engine/gameManager.js"></script>
    <script src="../js/engine/inventory.js"></script>
    <script src="../js/rooms/room2.js"></script>
</body>
</html>
