<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room 4 - Oficina de Seguridad</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/rooms.css">
</head>
<body>

    <header class="room-header">
        <div class="room-title">SALA 4: CONTROL DE ACCESO MAESTRO</div>
        <button id="btn-back" class="btn-back">⬅ Volver a Sala 3</button>  
        <button id="btn-exit-game" class="btn-back" style="border-color: #ef4444; color: #ef4444;">✖ Salir</button>      
    </header>

    <main class="game-area">
        <div id="room-environment" class="room-bg" style="background-color: #2c3e50;">
            
            <div id="door-escape" class="interactable locked" style="right: 5%; bottom: 0; width: 180px; height: 300px; background-color: #17202a; border: 4px solid #000;"></div>
            
            <div id="scanner-trigger" class="interactable" style="left: 20%; top: 40%; width: 120px; height: 160px; background-color: #7f8c8d; border-radius: 8px; box-shadow: inset 0 0 20px #000;">Escáner Dañado</div>

            <div class="interactable radio-oculta" style="left: 10%; top: 80%; width: 40px; height: 30px; background-color: #555; border-radius: 4px;">Radio</div>
        </div>

        <!-- Modal del Puzzle de Drag & Drop -->
        <div id="dnd-modal" class="modal hidden">
            <div class="modal-content" style="width: 500px;">
                <h3>Reconstrucción de Tarjeta Maestra</h3>
                <p>El escáner requiere una tarjeta de acceso intacta. Arrastra los fragmentos geométricos y reconstrúyela en la bandeja de lectura.</p>
                
                <div class="dnd-interface">
                    <!-- Zona donde aparecen las piezas desordenadas -->
                    <div class="pieces-pool" id="pieces-pool">
                        <!-- Nota: El ID identifica la pieza, el data-target indica a qué hueco pertenece -->
                        <div class="card-piece piece-tl" draggable="true" id="piece-1" data-target="1">💳<br>Sup-Izq</div>
                        <div class="card-piece piece-br" draggable="true" id="piece-4" data-target="4">💳<br>Inf-Der</div>
                        <div class="card-piece piece-tr" draggable="true" id="piece-2" data-target="2">💳<br>Sup-Der</div>
                        <div class="card-piece piece-bl" draggable="true" id="piece-3" data-target="3">💳<br>Inf-Izq</div>
                    </div>

                    <!-- La bandeja de lectura (Grid 2x2) -->
                    <div class="reader-tray">
                        <div class="drop-zone" data-slot="1"></div>
                        <div class="drop-zone" data-slot="2"></div>
                        <div class="drop-zone" data-slot="3"></div>
                        <div class="drop-zone" data-slot="4"></div>
                    </div>
                </div>

                <div id="scanner-status" style="padding: 10px; margin-top: 20px; text-align: center; font-weight: bold; border-radius: 4px; background-color: rgba(239, 68, 68, 0.2); color: var(--color-alert); border: 1px solid var(--color-alert);">TARJETA NO DETECTADA</div>
                
                <button id="btn-close-scanner" class="btn-close" style="margin-top: 15px; width: 100%;">Cerrar Panel</button>
            </div>
        </div>
    </main>

    <footer id="inventory-bar">
        <div class="inventory-title">OBJETOS:</div>
        <div id="inventory-slots" class="slots-container"></div>
    </footer>

    <script src="../js/engine/gameManager.js"></script>
    <script src="../js/engine/inventory.js"></script>
    <script src="../js/rooms/room4.js"></script>
</body>
</html>
